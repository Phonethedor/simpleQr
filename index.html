<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Generate a QR code from any text or URL. Download it as a JPG instantly, no sign-up required." />
    <title>QR Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
  <script type="module" crossorigin src="/simpleQr/assets/index-BtMvDl2-.js"></script>
  <link rel="stylesheet" crossorigin href="/simpleQr/assets/index-BQ6biQ-b.css">
</head>

<body>

    <header class="site-header">
        <div class="site-header__inner">
            <span class="site-header__logo">Generador de QR</span>
            <button id="btn-theme" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">
                <svg class="icon icon--sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg class="icon icon--moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="card">

            <div class="card__header">
                <h1 class="card__title">Generador de QR</h1>
                <p class="card__subtitle">Ingresa cualquier texto o URL a continuación y obtén un código QR descargable
                    al instante.</p>
            </div>

            <div class="card__body">
                <div class="field">
                    <label class="field__label" for="qr-input">Texto o URL</label>
                    <textarea id="qr-input" class="field__textarea" placeholder="https://example.com" rows="3"
                        maxlength="500" aria-describedby="char-count error-msg"></textarea>
                    <div class="field__meta">
                        <span id="error-msg" class="field__error" role="alert" aria-live="assertive"></span>
                        <span id="char-count" class="field__counter">0 / 500</span>
                    </div>
                </div>

                <button id="btn-generate" class="btn btn--primary">
                    Generar QR
                </button>
            </div>

            <div id="result-section" class="result result--hidden">
                <div class="result__divider"></div>
                <canvas id="qr-canvas" class="result__canvas" aria-label="Generated QR code" role="img"></canvas>
                <button id="btn-download" class="btn btn--download">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Descargar JPG
                </button>
            </div>

        </div>
    </main>

</body>

</html>
